<!DOCTYPE html>
<html lang="{{ .Language.Lang }}" {{ if eq .Language.Lang "ar" }}dir="rtl"{{ end }}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | STOPSIT Topographie Kenitra</title>
    <meta name="description" content="{{ .Params.description }}">
    {{ with .Params.keywords }}<meta name="keywords" content="{{ delimit . ", " }}">{{ end }}
    <link rel="canonical" href="{{ .Permalink }}">

    <!-- Hreflang for multilingual SEO -->
    {{ range .Translations }}
    <link rel="alternate" hreflang="{{ .Language.Lang }}" href="{{ .Permalink }}">
    {{ end }}

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Reuse your existing stylesheet -->
    <link rel="stylesheet" href="{{ "styles.css" | absURL }}">
    <link rel="stylesheet" href="{{ "blog.css" | absURL }}">
</head>
<body>
    {{ partial "header.html" . }}
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
</body>
</html>
