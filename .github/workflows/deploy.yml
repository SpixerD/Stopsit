name: Publish Scheduled Articles & Deploy

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (08:00 Morocco time)
  push:
    branches: [main]
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1: Move due drafts into articles/, update articles-list.js
  # ───────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Publish due articles (FR + EN + AR)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today is: $TODAY"
          PUBLISHED_ANY=false

          shopt -s nullglob
          # Targets index.html inside each subfolder of drafts
          fr_files=(articles/drafts/*/index.html)

          for file in "${fr_files[@]}"; do
            # Get the folder name to use as the SLUG
            SLUG=$(basename $(dirname "$file"))
            
            # Extract publish date from the first line of index.html
            PUBLISH_DATE=$(head -1 "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            [ -z "$PUBLISH_DATE" ] && continue

            if [[ ! "$PUBLISH_DATE" > "$TODAY" ]]; then
              echo "Processing slug: $SLUG (Date: $PUBLISH_DATE)"

              # 1. Move French (Main) Folder
              DEST_FR="articles/$SLUG/"
              mkdir -p "$DEST_FR"
              mv articles/drafts/"$SLUG"/* "$DEST_FR"
              # Remove the now empty draft folder
              rm -rf articles/drafts/"$SLUG"

              # Extract metadata from the newly moved index.html
              TITLE=$(grep -oP '(?<=<title>).*?(?= \| STOPSIT)' "$DEST_FR/index.html" | head -1)
              DESC=$(grep -oP '(?<=name="description" content=").*?(?=")' "$DEST_FR/index.html" | head -1)
              READ_TIME=$(grep -oP '(?<=fa-clock" aria-hidden="true"></i> )\d+ min' "$DEST_FR/index.html" | head -1)
              [ -z "$READ_TIME" ] && READ_TIME="5 min"

              # Update Sitemap for FR
              ARTICLE_URL="https://stopsit.ma/articles/$SLUG/"
              if ! grep -qF "<loc>$ARTICLE_URL</loc>" sitemap.xml; then
                sed -i "s|</urlset>|  <url>\n    <loc>$ARTICLE_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>\n</urlset>|" sitemap.xml
              fi

              EN_SLUG=""
              AR_SLUG=""

              # 2. Check and Move English Version (if exists in articles/drafts/en/slug/index.html)
              if [ -d "articles/drafts/en/$SLUG" ]; then
                DEST_EN="articles/en/$SLUG/"
                mkdir -p "$DEST_EN"
                mv articles/drafts/en/"$SLUG"/* "$DEST_EN"
                rm -rf articles/drafts/en/"$SLUG"

                EN_SLUG="en/$SLUG/"
                EN_URL="https://stopsit.ma/articles/en/$SLUG/"
                if ! grep -qF "<loc>$EN_URL</loc>" sitemap.xml; then
                  sed -i "s|</urlset>|  <url>\n    <loc>$EN_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n</urlset>|" sitemap.xml
                fi
              fi

              # 3. Check and Move Arabic Version (if exists in articles/drafts/ar/slug/index.html)
              if [ -d "articles/drafts/ar/$SLUG" ]; then
                DEST_AR="articles/ar/$SLUG/"
                mkdir -p "$DEST_AR"
                mv articles/drafts/ar/"$SLUG"/* "$DEST_AR"
                rm -rf articles/drafts/ar/"$SLUG"

                AR_SLUG="ar/$SLUG/"
                AR_URL="https://stopsit.ma/articles/ar/$SLUG/"
                if ! grep -qF "<loc>$AR_URL</loc>" sitemap.xml; then
                  sed -i "s|</urlset>|  <url>\n    <loc>$AR_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n</urlset>|" sitemap.xml
                fi
              fi

              export JS_FILENAME="$SLUG/"
              export JS_TITLE="$TITLE"
              export JS_DESC="$DESC"
              export JS_DATE="$PUBLISH_DATE"
              export JS_READTIME="$READ_TIME"
              export JS_EN_SLUG="$EN_SLUG"
              export JS_AR_SLUG="$AR_SLUG"

              node -e "
                const fs = require('fs');
                const content = fs.readFileSync('articles/articles-list.js', 'utf8');
                if (content.includes('\"' + process.env.JS_FILENAME + '\"')) {
                  console.log('Already in articles-list.js, skipping');
                  process.exit(0);
                }
                const en = process.env.JS_EN_SLUG;
                const ar = process.env.JS_AR_SLUG;
                let translationsField = '';
                if (en || ar) {
                  translationsField = ',\\n        translations: {';
                  if (en) translationsField += '\\n            en: \"' + en + '\"' + (ar ? ',' : '');
                  if (ar) translationsField += '\\n            ar: \"' + ar + '\"';
                  translationsField += '\\n        }';
                }
                const newEntry = [
                  '    {',
                  '        slug: \"' + process.env.JS_FILENAME + '\",',
                  '        title: \"' + process.env.JS_TITLE.replace(/\"/g, '\\\\\"') + '\",',
                  '        description: \"' + process.env.JS_DESC.replace(/\"/g, '\\\\\"') + '\",',
                  '        date: \"' + process.env.JS_DATE + '\",',
                  '        readTime: \"' + process.env.JS_READTIME + '\"' + translationsField,
                  '    },'
                ].join('\\n');
                const updated = content.replace('const articles = [', 'const articles = [\\n' + newEntry);
                fs.writeFileSync('articles/articles-list.js', updated);
              "
              PUBLISHED_ANY=true
            else
              echo "Skipping $SLUG: Scheduled for $PUBLISH_DATE"
            fi
          done

          if [ "$PUBLISHED_ANY" = true ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/ sitemap.xml
            git commit -m "chore: publish scheduled articles for $TODAY"
            git push
          else
            echo "No articles due today."
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ───────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
