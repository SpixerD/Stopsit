name: Publish Scheduled Articles & Deploy

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (08:00 Morocco time)
  push:
    branches: [main]
  workflow_dispatch:        # ← Manual trigger: GitHub UI → Actions → "Run workflow"

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1: Move due drafts into articles/, update articles-list.js
  # ───────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Publish due articles (FR + EN + AR)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today is: $TODAY"
          PUBLISHED_ANY=false

          shopt -s nullglob

          fr_files=(articles/drafts/*.html)
          declare -A published_slugs

          for file in "${fr_files[@]}"; do
            FILENAME=$(basename "$file")
            SLUG="${FILENAME%.html}"
            PUBLISH_DATE=$(head -1 "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            [ -z "$PUBLISH_DATE" ] && continue

            if [[ "$PUBLISH_DATE" <= "$TODAY" ]]; then
              mv "$file" "articles/$FILENAME"

              TITLE=$(grep -oP '(?<=<title>).*?(?= \| STOPSIT)' "articles/$FILENAME" | head -1)
              DESC=$(grep -oP '(?<=name="description" content=").*?(?=")' "articles/$FILENAME" | head -1)
              READ_TIME=$(grep -oP '(?<=fa-clock" aria-hidden="true"></i> )\d+ min' "articles/$FILENAME" | head -1)
              [ -z "$READ_TIME" ] && READ_TIME="5 min"

              echo "Publishing FR: $FILENAME"

              ARTICLE_URL="https://stopsit.ma/articles/$FILENAME"
              sed -i "s|</urlset>|  <url>\n    <loc>$ARTICLE_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>\n</urlset>|" sitemap.xml

              EN_SLUG=""
              AR_SLUG=""
              if [ -f "articles/drafts/en/$FILENAME" ]; then
                mv "articles/drafts/en/$FILENAME" "articles/en/$FILENAME"
                EN_SLUG="en/$FILENAME"
              fi
              if [ -f "articles/drafts/ar/$FILENAME" ]; then
                mv "articles/drafts/ar/$FILENAME" "articles/ar/$FILENAME"
                AR_SLUG="ar/$FILENAME"
              fi

              node -e "
                const fs = require('fs');
                const content = fs.readFileSync('articles/articles-list.js', 'utf8');
                const enSlug = '$EN_SLUG';
                const arSlug = '$AR_SLUG';
                const translationsField = (enSlug || arSlug)
                  ? ',\n        translations: {' +
                    (enSlug ? '\n            en: \"' + enSlug + '\"' : '') +
                    (enSlug && arSlug ? ',' : '') +
                    (arSlug ? '\n            ar: \"' + arSlug + '\"' : '') +
                    '\n        }'
                  : '';
                const newEntry = [
                  '    {',
                  '        slug: \"$FILENAME\",',
                  '        title: \"$TITLE\",',
                  '        description: \"$DESC\",',
                  '        date: \"$PUBLISH_DATE\",',
                  '        readTime: \"$READ_TIME\"' + translationsField,
                  '    },'
                ].join('\n');
                const updated = content.replace(
                  'const articles = [',
                  'const articles = [\n' + newEntry
                );
                fs.writeFileSync('articles/articles-list.js', updated);
                console.log('articles-list.js updated: $FILENAME');
              "

              PUBLISHED_ANY=true
            else
              echo "FR draft $FILENAME not yet due ($PUBLISH_DATE > $TODAY)"
            fi
          done

          if [ "$PUBLISHED_ANY" = true ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/ sitemap.xml
            git commit -m "chore: publish scheduled articles for $TODAY"
            git push
          else
            echo "No articles due today. Nothing committed."
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages (runs after publish)
  # ───────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: main   # Always pull latest (includes any publish bot commit)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4