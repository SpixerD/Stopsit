name: Publish Scheduled Articles

on:
  schedule:
    - cron: '0 7 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Publish due articles
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today is: $TODAY"
          PUBLISHED_ANY=false

          shopt -s nullglob
          files=(articles/drafts/*.html)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No draft articles found. Nothing to publish."
            exit 0
          fi

          for file in "${files[@]}"; do
            PUBLISH_DATE=$(head -1 "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            [ -z "$PUBLISH_DATE" ] && continue

            echo "Found draft: $file with publish date: $PUBLISH_DATE"

            # Compare dates as plain strings (YYYY-MM-DD format sorts correctly)
            if [ "$PUBLISH_DATE" \<= "$TODAY" ]; then
              FILENAME=$(basename "$file")
              echo "Publishing: $FILENAME"

              mv "$file" "articles/published/$FILENAME"

              TITLE=$(grep -oP '(?<=<title>).*?(?= \| STOPSIT)' "articles/published/$FILENAME" | head -1)
              DESC=$(grep -oP '(?<=name="description" content=").*?(?=")' "articles/published/$FILENAME" | head -1)
              READ_TIME=$(grep -oP '(?<=<i class="fas fa-clock"></i> )\d+ min' "articles/published/$FILENAME" | head -1)
              [ -z "$READ_TIME" ] && READ_TIME="5 min"

              echo "Title: $TITLE"
              echo "Desc: $DESC"
              echo "Read time: $READ_TIME"

              node -e "
                const fs = require('fs');
                const content = fs.readFileSync('articles/articles-list.js', 'utf8');
                const newEntry = [
                  '    {',
                  '        slug: \"published/$FILENAME\",',
                  '        title: \"$TITLE\",',
                  '        description: \"$DESC\",',
                  '        date: \"$PUBLISH_DATE\",',
                  '        readTime: \"$READ_TIME\"',
                  '    }'
                ].join('\n');
                const updated = content.replace(
                  'const articles = [',
                  'const articles = [\n' + newEntry + ','
                );
                fs.writeFileSync('articles/articles-list.js', updated);
                console.log('articles-list.js updated');
              "

              PUBLISHED_ANY=true
            else
              echo "Not yet due: $PUBLISH_DATE > $TODAY, skipping."
            fi
          done

          if [ "$PUBLISHED_ANY" = true ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/
            git commit -m "chore: publish scheduled articles for $TODAY"
            git push
          else
            echo "No articles due today."
          fi