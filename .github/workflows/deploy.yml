name: Publish Scheduled Articles & Deploy

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC (08:00 Morocco time)
  push:
    branches: [main]
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────
  # JOB 1: Move due drafts into articles/, update articles-list.js
  # ───────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Publish due articles (FR + EN + AR)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today is: $TODAY"
          PUBLISHED_ANY=false

          shopt -s nullglob
          fr_files=(articles/drafts/*.html)

          for file in "${fr_files[@]}"; do
            FILENAME=$(basename "$file")
            # Extract date from the first line of the file
            PUBLISH_DATE=$(head -1 "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            [ -z "$PUBLISH_DATE" ] && continue

            # Logic: If PUBLISH_DATE is NOT greater than TODAY (meaning Today or Past)
            if [[ ! "$PUBLISH_DATE" > "$TODAY" ]]; then
              echo "Processing: $FILENAME (Date: $PUBLISH_DATE)"
              
              mv "$file" "articles/$FILENAME"

              # Extract metadata safely
              TITLE=$(grep -oP '(?<=<title>).*?(?= \| STOPSIT)' "articles/$FILENAME" | head -1)
              DESC=$(grep -oP '(?<=name="description" content=").*?(?=")' "articles/$FILENAME" | head -1)
              READ_TIME=$(grep -oP '(?<=fa-clock" aria-hidden="true"></i> )\d+ min' "articles/$FILENAME" | head -1)
              [ -z "$READ_TIME" ] && READ_TIME="5 min"

              # Update Sitemap — guard against duplicate FR URL
              ARTICLE_URL="https://stopsit.ma/articles/$FILENAME"
              if ! grep -qF "<loc>$ARTICLE_URL</loc>" sitemap.xml; then
                sed -i "s|</urlset>|  <url>\n    <loc>$ARTICLE_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>\n</urlset>|" sitemap.xml
              fi

              # Move translations if they exist and add to sitemap
              EN_SLUG=""
              AR_SLUG=""

              if [ -f "articles/drafts/en/$FILENAME" ]; then
                mv "articles/drafts/en/$FILENAME" "articles/en/$FILENAME"
                EN_SLUG="en/$FILENAME"
                EN_URL="https://stopsit.ma/articles/en/$FILENAME"
                if ! grep -qF "<loc>$EN_URL</loc>" sitemap.xml; then
                  sed -i "s|</urlset>|  <url>\n    <loc>$EN_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n</urlset>|" sitemap.xml
                fi
              fi

              if [ -f "articles/drafts/ar/$FILENAME" ]; then
                mv "articles/drafts/ar/$FILENAME" "articles/ar/$FILENAME"
                AR_SLUG="ar/$FILENAME"
                AR_URL="https://stopsit.ma/articles/ar/$FILENAME"
                if ! grep -qF "<loc>$AR_URL</loc>" sitemap.xml; then
                  sed -i "s|</urlset>|  <url>\n    <loc>$AR_URL</loc>\n    <lastmod>$PUBLISH_DATE</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.7</priority>\n  </url>\n</urlset>|" sitemap.xml
                fi
              fi

              # --- SAFE NODE.JS EXECUTION USING ENV VARS ---
              export JS_FILENAME="$FILENAME"
              export JS_TITLE="$TITLE"
              export JS_DESC="$DESC"
              export JS_DATE="$PUBLISH_DATE"
              export JS_READTIME="$READ_TIME"
              export JS_EN_SLUG="$EN_SLUG"
              export JS_AR_SLUG="$AR_SLUG"

              node -e "
                const fs = require('fs');
                const content = fs.readFileSync('articles/articles-list.js', 'utf8');
                
                // Guard: don't add duplicate entries
                if (content.includes('\"' + process.env.JS_FILENAME + '\"')) {
                  console.log('Already in articles-list.js, skipping: ' + process.env.JS_FILENAME);
                  process.exit(0);
                }

                const en = process.env.JS_EN_SLUG;
                const ar = process.env.JS_AR_SLUG;

                let translationsField = '';
                if (en || ar) {
                  translationsField = ',\n        translations: {';
                  if (en) translationsField += '\n            en: \"' + en + '\"' + (ar ? ',' : '');
                  if (ar) translationsField += '\n            ar: \"' + ar + '\"';
                  translationsField += '\n        }';
                }

                const newEntry = [
                  '    {',
                  '        slug: \"' + process.env.JS_FILENAME + '\",',
                  '        title: \"' + process.env.JS_TITLE.replace(/\"/g, '\\\\\"') + '\",',
                  '        description: \"' + process.env.JS_DESC.replace(/\"/g, '\\\\\"') + '\",',
                  '        date: \"' + process.env.JS_DATE + '\",',
                  '        readTime: \"' + process.env.JS_READTIME + '\"' + translationsField,
                  '    },'
                ].join('\n');

                const updated = content.replace('const articles = [', 'const articles = [\n' + newEntry);
                fs.writeFileSync('articles/articles-list.js', updated);
                console.log('Updated articles-list.js for: ' + process.env.JS_FILENAME);
              "

              PUBLISHED_ANY=true
            else
              echo "Skipping $FILENAME: Scheduled for $PUBLISH_DATE (Future)"
            fi
          done

          if [ "$PUBLISHED_ANY" = true ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles/ sitemap.xml
            git commit -m "chore: publish scheduled articles for $TODAY"
            git push
          else
            echo "No articles due today."
          fi

  # ───────────────────────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages (runs after publish)
  # ───────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: main   # Pull latest changes from the 'publish' job commit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
