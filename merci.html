<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci — STOPSIT Topographie Kenitra</title>
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://stopsit.ma/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .thankyou-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
        }
        .thankyou-card {
            background: white;
            border-radius: 16px;
            padding: 3rem 2.5rem;
            max-width: 520px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .thankyou-icon {
            font-size: 4rem;
            color: #2c6e49;
            margin-bottom: 1.5rem;
        }
        .thankyou-card h1 { color: #2c6e49; font-size: 2rem; margin-bottom: 1rem; }
        .thankyou-card p { color: #555; font-size: 1.05rem; line-height: 1.7; margin-bottom: 1.5rem; }
        .back-btn {
            display: inline-block;
            background: #d68c45;
            color: white;
            padding: 0.85rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #c07a35; }
    </style>
</head>
<body>
    <div class="thankyou-wrapper">
        <div class="thankyou-card">
            <div class="thankyou-icon"><i class="fas fa-check-circle"></i></div>
            <h1>Merci pour votre message !</h1>
            <p>Notre équipe a bien reçu votre demande. Un ingénieur topographe de STOPSIT vous contactera dans les <strong>24 heures</strong> ouvrables.</p>
            <p>Pour toute urgence, appelez directement le <a href="tel:+212661688603" style="color:#2c6e49;font-weight:600;">+212 661-688603</a>.</p>
            <a href="" class="back-btn"><i class="fas fa-arrow-left" style="margin-right:0.5rem;"></i> Retour au site</a>
        </div>
    </div>
</body>
</html>
